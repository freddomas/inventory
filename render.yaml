services:
  - type: web
    name: inventory
    runtime: node
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
    disk:
      name: inventory-data
      mountPath: /var/data
      sizeGB: 1
